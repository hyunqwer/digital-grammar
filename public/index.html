<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>중학 문법이 곧 실력 · Chapter 01 차시 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --card:#ffffff; --ink:#191f28; --muted:#8b95a1; --line:#e5e8eb;
    --brand:#3182f6; --brand2:#3182f6; --lip:#1b64da; --sel:#3182f6; --sel-bg:#e8f1fd; --accent:#03b26c; --warn:#f04452; --gold:#fe9800; --fox:#fe9800;
    --soft:#f2f4f6; --shadow:0 2px 8px rgba(0,0,0,.08); --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:clamp(15px,1vw,17px)}
  html,body{margin:0;height:100%}
  body{font-family:"Pretendard","Pretendard Variable","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;color:var(--ink);
    background:#e5e5e5;display:flex;align-items:center;justify-content:center;min-height:100dvh}
  h2,.title,.stp,.scorebig,.splash .stp,.btn,.ovmark{font-family:"Nunito","Pretendard",system-ui,sans-serif}
  .app{width:100%;max-width:1040px;height:100dvh;background:var(--soft);display:flex;flex-direction:column;position:relative;overflow:hidden}
  @media(min-width:1080px) and (min-height:840px){.app{height:min(96dvh,1180px);border-radius:30px;box-shadow:0 40px 90px rgba(0,0,0,.5)}}
  .hud{background:linear-gradient(135deg,#0064ff,#0052e0);color:#fff;padding:clamp(9px,1.5vw,15px) clamp(14px,3vw,28px)}
  .hud-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .crumb{font-size:.72rem;opacity:.92;font-weight:700;letter-spacing:.3px}
  .title{font-size:clamp(1rem,1.6vw,1.25rem);font-weight:850;margin-top:3px}
  .coins{display:flex;gap:8px;align-items:center;flex-shrink:0}
  .pill{background:rgba(255,255,255,.18);border-radius:999px;padding:6px 12px;font-size:.78rem;font-weight:850;display:flex;gap:5px;align-items:center}
  .pill.b{cursor:pointer;transition:.15s}.pill.b:active{transform:scale(.94)}
  .gauge-wrap{margin-top:9px}.gauge-label{display:flex;justify-content:space-between;font-size:.68rem;font-weight:800;opacity:.95;margin-bottom:6px}
  .gauge{height:12px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden}
  .gauge>i{display:block;height:100%;width:0;border-radius:999px;background:#3182f6;box-shadow:inset 0 3px 0 rgba(255,255,255,.35);transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .steps{margin-top:9px;font-size:.7rem;font-weight:850;opacity:.95;display:flex;align-items:center;gap:7px;letter-spacing:.2px}
  .steps>i{flex:1;min-width:14px;height:6px;border-radius:999px;background:rgba(255,255,255,.25)}
  .steps>i.done{background:#cfe3fb}.steps>i.cur{background:#fff}
  .stage{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:clamp(12px,1.8vw,22px) clamp(14px,3vw,40px) clamp(10px,1.6vw,18px)}
  .wrap{max-width:720px;margin:0 auto}
  .kicker{font-size:.74rem;font-weight:850;color:var(--brand);letter-spacing:.4px;text-transform:uppercase}
  .qcount{font-size:.78rem;color:var(--muted);font-weight:800}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  h2{font-size:clamp(1.12rem,2vw,1.42rem);margin:2px 0 4px;font-weight:880;letter-spacing:-.3px}
  .lead{color:var(--muted);font-size:clamp(.86rem,1.3vw,.98rem);line-height:1.55;margin:0 0 14px}
  .card{background:var(--card);border-radius:var(--r);border:2px solid var(--line);box-shadow:none;padding:clamp(14px,2.2vw,24px)}
  .qhead{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .qbadge{font-size:.74rem;font-weight:850;color:#fff;background:var(--brand2);padding:5px 12px;border-radius:999px}
  .qtype{font-size:.74rem;font-weight:800;color:var(--muted)}
  .ko{color:#4e5968;font-size:clamp(.98rem,1.5vw,1.05rem);font-weight:600;margin-bottom:10px}
  .qprompt{display:block;margin-top:8px;font-size:clamp(1.2rem,2vw,1.45rem);font-weight:850;color:var(--ink)}
  .gcard{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:6px 18px;background:var(--soft);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;font-size:.92rem;color:var(--muted)}
  .gcard .gp b{color:var(--ink);font-weight:800}
  .gpara{font-size:clamp(1.05rem,1.8vw,1.22rem);line-height:2.2;color:var(--ink);font-weight:600}
  .blankin{display:inline-block;width:84px;border:none;border-bottom:2.5px solid #3182f6;background:#f2f4f6;border-radius:6px 6px 0 0;padding:2px 6px;font:inherit;font-size:.96em;font-weight:800;color:#3182f6;text-align:center;vertical-align:baseline}
  .blankin:focus{outline:none;background:#e8f1fd}
  .blankin.ginok{border-bottom-color:var(--accent);color:#0c7a4c;background:#e8fbf1}
  .blankin.ginno{border-bottom-color:var(--warn);color:var(--warn);background:#fff0f3}
  .qtext{font-size:clamp(1.12rem,2.1vw,1.45rem);font-weight:800;line-height:1.45;margin:4px 0}
  .qtext .blank{display:inline-block;min-width:60px;border-bottom:4px solid var(--brand);margin:0 6px;text-align:center;color:var(--brand)}
  .opts{display:flex;flex-direction:column;gap:9px;margin-top:14px}
  .opt{border:2.5px solid var(--line);background:#fff;border-radius:14px;padding:clamp(10px,1.7vw,15px) 18px;font-size:clamp(1rem,1.7vw,1.18rem);font-weight:750;text-align:left;cursor:pointer;transition:.13s;display:flex;align-items:center;gap:12px}
  .opt:hover{border-color:#b9e3fb}.opt .mk{width:30px;height:30px;border-radius:9px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:850;color:var(--muted);flex-shrink:0}
  .opt.sel{border-color:var(--sel);background:var(--sel-bg)}.opt.sel .mk{background:var(--brand);color:#fff}
  .opt.correct{border-color:var(--accent);background:#e8fbf1}.opt.correct .mk{background:var(--accent);color:#fff}
  .opt.wrong{border-color:var(--warn);background:#fff0f3}.opt.wrong .mk{background:var(--warn);color:#fff}
  .opt.dim{opacity:.45}
  .ox{display:flex;gap:16px;margin-top:24px}
  .ox button{flex:1;border:2.5px solid var(--line);background:#fff;border-radius:18px;padding:clamp(18px,3vw,32px) 0;font-size:clamp(2rem,4vw,2.6rem);font-weight:900;cursor:pointer;transition:.13s}
  .ox button.o{color:var(--accent)}.ox button.x{color:var(--warn)}
  .ox button.sel{box-shadow:0 0 0 4px rgba(49,130,246,.28) inset;transform:scale(.98)}
  .ox button.correct{border-color:var(--accent);background:#e8fbf1}.ox button.wrong{border-color:var(--warn);background:#fff0f3}
  .build{min-height:64px;border:2.5px dashed #b9e3fb;border-radius:16px;padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:#fbfcff;margin-top:16px}
  .build:empty::before{content:"카드를 눌러 문장을 만들어 보세요";color:var(--muted);font-size:.9rem}
  .bank{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
  .chip{border:2.5px solid var(--line);background:#fff;border-radius:13px;padding:10px 16px;font-size:clamp(1rem,1.7vw,1.18rem);font-weight:750;cursor:pointer;transition:.12s}
  .chip:hover{border-color:var(--sel);color:var(--brand)}
  .chip.used{opacity:.2;pointer-events:none}
  .chip.inbuild{border-color:var(--sel);background:var(--sel-bg);color:var(--brand)}
  .becard{display:inline-flex;align-items:center;gap:6px;border:2.5px dashed var(--gold);border-radius:13px;padding:7px 10px;background:#fffaf0}
  .becard .lab{font-size:.72rem;font-weight:850;color:var(--gold)}
  .beopt{border:2px solid var(--gold);background:#fff;border-radius:9px;padding:6px 12px;font-size:1rem;font-weight:800;color:#c98200;cursor:pointer}
  .beopt:hover{background:#fff3da}
  .bechip{border-color:var(--gold)!important;background:#fff7e8!important;color:#c98200!important}
  .token{display:inline-block;padding:2px 4px;border-radius:6px;cursor:pointer;transition:.1s;border-bottom:2px dashed transparent}
  .token.tapcand{border-bottom:2px dashed #93c5fd;color:#1b64da;font-weight:800}
  .token:hover{background:var(--sel-bg)}
  .token.sel{background:#fff0f3;border-bottom:2px solid var(--warn);color:var(--warn);font-weight:850}
  .blankcyc{display:inline-block;min-width:60px;text-align:center;padding:1px 10px;margin:0 4px;border-bottom:3px solid #3182f6;color:#3182f6;font-weight:900;cursor:pointer;border-radius:6px 6px 0 0;transition:.1s}
  .blankcyc:hover{background:var(--sel-bg)}
  .blankcyc.empty{color:#93c5fd;border-bottom-color:#93c5fd}
  .blankcyc.correct{color:#0c7a4c;border-bottom-color:var(--accent);background:#e8fbf1}
  .blankcyc.wrong{color:var(--warn);border-bottom-color:var(--warn);background:#fff0f3}
  .tin{width:100%;border:2.5px solid var(--line);border-radius:16px;padding:14px 16px;font-size:clamp(1.05rem,1.8vw,1.2rem);font-weight:650;font-family:inherit;margin-top:14px}
  .reason-choices{display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px}
  .reason-choice{border:2px solid var(--line);background:#fff;border-radius:14px;padding:11px 14px;font-size:.92rem;font-weight:800;text-align:left;cursor:pointer;transition:.12s}
  .reason-choice:hover{border-color:var(--sel);color:var(--brand)}
  .reason-choice.sel{border-color:var(--sel);background:var(--sel-bg);color:var(--brand)}
  .reason-choice.correct{border-color:var(--accent);background:#e8fbf1;color:#0c7a4c}
  .reason-choice.wrong{border-color:var(--warn);background:#fff0f3;color:#bf2a48}
  .reason-template{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:10px;padding:12px 14px;background:#fbfcff;border:1.5px solid var(--line);border-radius:14px;font-size:.92rem;font-weight:750}
  .reason-mini{width:92px;border:2px solid var(--line);border-radius:10px;padding:7px 9px;font-size:.9rem;font-weight:800;font-family:inherit;text-align:center}
  .tin:focus{outline:none;border-color:var(--sel)}.tin:disabled{background:#f7f8fd}
  .tin.sm{margin-top:10px}
  .lbl{font-size:.8rem;font-weight:800;color:var(--muted);margin-top:14px}
  .hintbtn{background:none;border:none;color:var(--gold);font-weight:850;font-size:.85rem;cursor:pointer;margin-top:10px}
  .fb{border-radius:16px;padding:15px 17px;margin-top:16px;font-size:clamp(.9rem,1.4vw,1rem);line-height:1.6;display:none;animation:pop .25s ease}
  .fb.show{display:block}
  .fb.ok{background:#e8fbf1;color:#0c7a4c;border:1.5px solid #b3eccf}
  .fb.no{background:#fff7ec;color:#b15c00;border:1.5px solid #ffdfa8}
  .fb-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-weight:880;margin-bottom:5px}
  .fb-ic{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;flex-shrink:0}
  .fb-ic.ok{background:var(--accent)} .fb-ic.no{background:#f59e3c}
  .fb-chip{font-size:.7rem;font-weight:850;padding:3px 9px;border-radius:999px;background:rgba(49,130,246,.12);color:var(--brand)}
  .fb-why{font-size:.92em;line-height:1.5;opacity:.95}
  .fb-sent{font-weight:850}
  .fb b{font-weight:880}
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .cta{padding:clamp(12px,2vw,18px) clamp(16px,4vw,56px) calc(clamp(12px,2vw,18px) + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(238,241,251,0),var(--soft) 35%)}
  .cta-in{max-width:720px;margin:0 auto;display:flex;gap:12px}
  .btn{flex:1;border:none;border-radius:16px;padding:clamp(12px,1.8vw,16px);font-size:clamp(.98rem,1.5vw,1.1rem);font-weight:880;cursor:pointer;transition:.15s;font-family:inherit}
  .btn.primary{background:var(--brand);color:#fff;box-shadow:0 4px 0 var(--lip);letter-spacing:.3px}
  .btn.primary:active{transform:translateY(4px);box-shadow:0 0 0 var(--lip)}.btn.ghost{background:#fff;color:var(--brand);border:2px solid var(--line);box-shadow:0 2px 0 var(--line)}
  .btn:disabled{opacity:.4;box-shadow:none;cursor:default}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:40;opacity:0}
  .overlay.show{animation:ovl .8s ease}
  @keyframes ovl{0%{opacity:0;transform:scale(.4)}25%{opacity:1;transform:scale(1)}70%{opacity:1}100%{opacity:0;transform:scale(1.05)}}
  .ovmark{width:clamp(120px,24vw,190px);height:clamp(120px,24vw,190px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(74px,15vw,120px);font-weight:900;color:#fff;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .ovmark.o{background:linear-gradient(135deg,#1fc77e,#03b26c)}.ovmark.x{background:linear-gradient(135deg,#ff6b76,#f04452)}
  .toast{position:absolute;top:clamp(86px,15vw,140px);left:50%;transform:translateX(-50%) scale(.6);background:linear-gradient(135deg,var(--gold),#ff7a59);color:#fff;font-weight:900;padding:12px 22px;border-radius:999px;font-size:1.05rem;box-shadow:0 12px 30px rgba(255,140,40,.5);opacity:0;pointer-events:none;transition:.3s;z-index:45}
  .toast.show{opacity:1;transform:translateX(-50%) scale(1)}
  /* 단계 전환(간지) */
  .splash{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;padding:30px;animation:sfade .4s ease}
  @keyframes sfade{from{opacity:0}to{opacity:1}}
  .splash .num{font-size:.9rem;font-weight:800;letter-spacing:3px;opacity:.7}
  .splash .ic{font-size:clamp(56px,12vw,90px);margin:14px 0;animation:sbob 1.6s ease-in-out infinite}
  @keyframes sbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .splash .stp{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;letter-spacing:-.5px}
  .splash .sub{font-size:clamp(.95rem,1.8vw,1.15rem);opacity:.85;margin-top:10px;max-width:420px;line-height:1.6}
  .splash .go{margin-top:26px;background:#fff;color:#222;border:none;border-radius:999px;padding:14px 30px;font-size:1.05rem;font-weight:880;cursor:pointer;box-shadow:0 14px 30px rgba(0,0,0,.3)}
  /* concept */
  .aitalk{background:var(--sel-bg);color:var(--ink);border-radius:16px;padding:clamp(12px,2.2vw,22px);text-align:center;border:2px solid var(--sel);box-shadow:none}
  .aiface{width:clamp(50px,8vw,72px);height:clamp(50px,8vw,72px);border-radius:50%;margin:0 auto 8px;background:var(--sel);display:flex;align-items:center;justify-content:center;font-size:clamp(26px,5vw,38px)}
  .aiface.talking{animation:ring 1.1s ease-out infinite}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(138,99,255,.55)}100%{box-shadow:0 0 0 28px rgba(138,99,255,0)}}
  .ainame{font-size:.78rem;font-weight:800;opacity:.7}
  .wave{display:flex;gap:4px;justify-content:center;height:16px;align-items:center;margin:6px 0}
  .ai-head{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:14px}
  .ai-head .aiface{margin:0;width:clamp(44px,6vw,56px);height:clamp(44px,6vw,56px);box-shadow:0 8px 20px rgba(49,130,246,.45)}
  .ai-meta{display:flex;flex-direction:column;gap:4px;text-align:left}
  .ai-meta .wave{margin:0;justify-content:flex-start;height:13px}
  .ctalk-body{text-align:center;line-height:1.5;font-weight:800;font-size:clamp(1.02rem,1.9vw,1.32rem)}
  .wave i{width:4px;height:8px;background:#3182f6;border-radius:2px}
  .wave.on i{animation:wv .8s ease-in-out infinite}
  .wave.on i:nth-child(2){animation-delay:.1s}.wave.on i:nth-child(3){animation-delay:.2s}.wave.on i:nth-child(4){animation-delay:.3s}.wave.on i:nth-child(5){animation-delay:.15s}.wave.on i:nth-child(6){animation-delay:.25s}
  @keyframes wv{0%,100%{height:8px}50%{height:22px}}
  .caption{font-size:clamp(1.08rem,2.1vw,1.4rem);font-weight:800;line-height:1.45;min-height:auto;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px}
  .caption em{color:#3182f6;font-style:normal}
  .caption .en{color:#03b26c;font-style:italic}
  .ctrl{display:flex;gap:10px;justify-content:center;margin-top:10px}
  .ctrl button{background:#fff;color:#3182f6;border:2px solid #cfe0fb;border-radius:12px;padding:9px 15px;font-weight:800;font-size:.85rem;cursor:pointer}
  .seg-prog{font-size:.74rem;opacity:.6;margin-top:12px;font-weight:700}
  .videobox{background:#000;border-radius:22px;overflow:hidden;box-shadow:var(--shadow)}
  .videobox video{width:100%;display:block;max-height:60dvh;background:#000}
  .scorebig{font-size:clamp(2.4rem,6vw,3.4rem);font-weight:900;text-align:center;background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.05}
  .scoresub{text-align:center;color:var(--muted);font-weight:800;margin-bottom:6px}
  .praise{text-align:center;font-weight:880;font-size:clamp(1.1rem,2vw,1.4rem);margin:6px 0}
  .qgrid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:18px 0}
  .qg{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:850;font-size:.8rem;color:#fff}
  .qg.o{background:var(--accent)}.qg.x{background:var(--warn)}
  .path{display:flex;flex-direction:column;gap:11px}
  .prow{display:flex;gap:14px;align-items:center;background:#fff;border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)}
  .path .prow{cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s}
  .path .prow:hover{border-color:#3182f6;transform:translateX(3px)}
  .path .prow:active{transform:scale(.99)}
  .prow .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
  .prow .tx{font-size:.95rem;font-weight:800}.prow .tx small{display:block;color:var(--muted);font-weight:650;font-size:.82rem;margin-top:2px}
  .goal-row{display:flex;gap:12px;align-items:flex-start;padding:9px 0}
  .goal-row+.goal-row{border-top:1px solid var(--line)}
  .goal-ck{flex-shrink:0;width:24px;height:24px;border-radius:9999px;background:#3182f6;color:#fff;font-size:.8rem;font-weight:900;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .goal-tx b{font-size:max(1rem,16px);font-weight:800;line-height:1.35}
  .goal-tx small{display:block;color:var(--muted);font-weight:650;font-size:.84rem;margin-top:2px}
  .tag{margin-left:auto;font-size:.7rem;font-weight:850;padding:5px 11px;border-radius:999px}
  .tag.good{background:#e8fbf1;color:#0c7a4c}.tag.weak{background:#fff0f3;color:#bf2a48}
  @keyframes diagIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .path .prow.diag-row{opacity:0;animation:diagIn .5s ease forwards}
  .diag-path{gap:8px}
  .diag-path .prow.diag-row{padding:10px 14px}
  .diag-path .prow.diag-row .ic{width:32px;height:32px;font-size:1rem}
  .diag-path .prow.diag-row .tx{font-size:.9rem}
  .diag-path .prow.diag-row .tx small{font-size:.76rem;margin-top:1px}
  @keyframes tagPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
  .tag.weak.pulse{animation:tagPulse 1.2s ease-in-out infinite}
  .mic-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin:22px 0 6px}
  .mic-btn{width:88px;height:88px;border-radius:50%;border:none;background:linear-gradient(135deg,#3182f6,#1b64da);color:#fff;font-size:2.1rem;cursor:pointer;box-shadow:0 6px 18px rgba(49,130,246,.35);transition:transform .12s;display:flex;align-items:center;justify-content:center}
  .mic-btn:active{transform:scale(.94)}
  .mic-btn.listening{animation:micPulse 1.1s ease-in-out infinite;background:linear-gradient(135deg,#f04452,#bf2a48)}

let __ttsAudio=null,__ttsToken=0; const __ttsCache={};
function stopSpeak(){ __ttsToken++; try{ if(__ttsAudio){__ttsAudio.pause();__ttsAudio.src='';__ttsAudio=null;} }catch(e){} try{if('speechSynthesis'in window)speechSynthesis.cancel();}catch(e){} }
async function fetchTTS(text,lang,voice){ const key=(lang||'ko')+'|'+(voice||'')+'|'+text; if(__ttsCache[key])return __ttsCache[key];
  const res=await fetch(TTS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,lang:lang,voice:voice})});
  if(!res.ok)throw new Error('tts '+res.status); const j=await res.json(); if(j.error)throw new Error(j.error);
  const src='data:audio/mpeg;base64,'+j.audio; __ttsCache[key]=src; return src; }
/* 클라우드 실패 시 기존 브라우저 음성으로 폴백 */
function webSpeakOne(c,cb){ try{ if(!('speechSynthesis'in window)){cb();return;}
    const en=c.lang==='en'; const u=new SpeechSynthesisUtterance(en?c.t:koPhonetic(c.t));
    u.lang=en?'en-US':'ko-KR'; if(en&&V.en)u.voice=V.en; if(!en&&V.ko)u.voice=V.ko;
    u.rate=en?0.95:1.05; u.pitch=en?1.0:1.2; u.onend=cb; u.onerror=cb;
    try{speechSynthesis.resume();}catch(e){} speechSynthesis.speak(u);
  }catch(e){cb();} }
function speakChunks(chunks,done){ stopSpeak(); const tok=__ttsToken; const list=chunks||[]; let i=0;
  async function nx(){ if(tok!==__ttsToken)return; if(i>=list.length){done&&done();return;}
    const c=list[i++]; if(c&&c.on)try{c.on();}catch(e){}
    const text=c&&c.t?sanitizeForVoice(c.t):''; let advanced=false;
    const go=()=>{ if(advanced||tok!==__ttsToken)return; advanced=true; nx(); };
    const fallback=()=>{ if(advanced||tok!==__ttsToken)return; advanced=true; webSpeakOne(c,()=>{ if(tok===__ttsToken)nx(); }); };
    if(!text){ go(); return; }
    const rlang=c.lang==='en'?'en':'ko';
    const asset=FIXED_AUDIO[ttsKey(text,rlang,c.voice)];
    if(asset){
      const a=new Audio(asset); __ttsAudio=a; a.onended=go; a.onerror=fallback;
      const p=a.play(); if(p&&p.catch)p.catch(fallback);
      return;
    }
    try{ const src=await fetchTTS(text,rlang,c.voice); if(tok!==__ttsToken)return;
      const a=new Audio(src); __ttsAudio=a; a.onended=go; a.onerror=fallback;
      const p=a.play(); if(p&&p.catch)p.catch(fallback);
    }catch(e){ fallback(); }
  }
  setTimeout(nx,60);
}

/* ---------- 퀴즈 진행기 ---------- */

function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function itemQuestionText(it){
  if(!it) return '';
  if(it.type==='mc') return (it.ko?it.ko+' ':'') + (it.q&&it.q.length>1 ? `${it.q[0]} ____ ${it.q[1]||''}` : (it.q&&it.q[0]||''));
  if(it.type==='ox') return (it.ko?it.ko+' ':'') + (it.sent||'');
  if(it.type==='order') return `${it.ko||''} / 배열: ${(it.ans||[]).join(' ')}`;
  if(it.type==='fix') return `${it.ko||''} / ${it.tokens.join(' ')}`;
  if(it.type==='write') return it.ko||'';
  if(it.type==='focus') return `${it.ko||''} / ${it.sentence.join(' ')}`;
  if(it.type==='complete') return `${it.kr||''} / ${it.parts.map(p=>typeof p==='number'?'____':p).join('')}`;
  return it.ko||it.q||'';
}
function itemAnswerText(it,api){
  let a='';
  try{ a=api&&api.get?api.get():''; }catch(e){ a=''; }
  if(a && typeof a==='object') a=Object.entries(a).map(([k,v])=>`${k}: ${v}`).join(' / ');
  return String(a||'');
}
function itemSolutionText(it){
  if(!it) return '';
  if(it.type==='order') return (it.ans||[]).join(' ');
  if(it.type==='blanks') return (it.lines||[]).map(l=>l.ans).join(' — ');
  if(it.type==='guide') return (it.answers||[]).map(a=>a[0]).join(' / ');
  if(it.type==='complete') return it.parts.map(p=>typeof p==='number'?it.answers[p][0]:p).join('');
  if(it.type==='fix') return `${it.tokens[it.wrongIdx]} → ${it.ans[0]}`;
  if(it.type==='write') return (it.ans||[])[0]||'';
  if(it.type==='focus') return `주어 ${it.subject} / ${it.kind} / ${it.be}`;
  return it.ans || '';
}
function recordHistory(opt,it,api,ok){
  S.history.push({
    stage:(opt&&opt.kicker?opt.kicker.replace(/<[^>]+>/g,''):'학습'),
    type:({mc:'객관식',ox:'O/X',order:'어순 배열',fix:'오류 수정',write:'서술형',focus:'3단계 판단',blanks:'빈칸 채우기',guide:'서술형(빈칸 완성)',complete:'문장 완성'}[it.type]||it.type),
    question:itemQuestionText(it),
    myAnswer:itemAnswerText(it,api),
    solution:itemSolutionText(it),
    correct:!!ok
  });
}
function renderHistoryTable(){
  const rows=S.history.map((h,i)=>`<tr><td>${i+1}</td><td>${esc(h.stage)}</td><td>${esc(h.type)}</td><td>${esc(h.question)}</td><td>${esc(h.myAnswer)}</td><td>${esc(h.solution)}</td><td class="${h.correct?'okcell':'nocell'}">${h.correct?'O':'X'}</td></tr>`).join('');
  return `<div class="card" style="margin-top:14px"><div style="font-weight:850;margin-bottom:12px">📋 내가 푼 문항 전체 결과</div><div style="max-height:360px;overflow:auto;border:1px solid var(--line);border-radius:16px"><table class="history-table"><thead><tr><th>#</th><th>단계</th><th>유형</th><th>문항</th><th>내 답</th><th>정답</th><th>결과</th></tr></thead><tbody>${rows||'<tr><td colspan="7">아직 기록이 없습니다.</td></tr>'}</tbody></table></div></div>`;
}

/* ---------- Gemini AI 연동 ---------- */
const GEMINI_URL='https://us-central1-yoons-digital-grammar-v2.cloudfunctions.net/askGemini';
async function callGemini(system,input,onDelta){
  const res=await fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system,input})});
  if(!res.ok||!res.body) throw new Error('네트워크 오류('+res.status+')');
  const reader=res.body.getReader(),dec=new TextDecoder(); let buf='',out='';
  while(true){ const {value,done}=await reader.read(); if(done)break; buf+=dec.decode(value,{stream:true});
    let nl; while((nl=buf.indexOf('\n\n'))>=0){ const chunk=buf.slice(0,nl); buf=buf.slice(nl+2);
      const m=chunk.match(/data:\s*(.*)/); if(!m)continue; let o; try{o=JSON.parse(m[1]);}catch(_){continue;}
      if(o.error)throw new Error(o.error); if(o.delta){ out+=o.delta; if(onDelta)onDelta(o.delta,out); } } }
  return out;
}
const streamGemini=callGemini;
function fmtFb(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<b style="color:#3182f6">$1</b>').replace(/\n/g,'<br>'); }
function markErrors(myAns,errs){ let s=esc(myAns);
  (errs||[]).forEach(e=>{ e=String(e||'').trim(); if(!e)return; const ee=esc(e);
    if(ee&&s.indexOf(ee)>=0) s=s.split(ee).join('<span style="color:var(--warn);font-weight:800;text-decoration:underline">'+ee+'</span>'); });
  return s; }
async function aiGradeWrite(it,myAns){
  const system='너는 한국 중학교 1학년의 be동사 영작을 첨삭하는 친절한 영어 선생님이야. 학생이 쓴 영어 문장이 주어진 한국어 문장의 올바른 번역인지 판단해. 철자·대소문자·마침표 같은 사소한 실수는 정답으로 인정하되, be동사(am/are/is) 선택과 주어-동사 일치가 틀리면 오답으로 처리해. 반드시 아래 JSON 형식으로만, 다른 말 없이 답해.\n{"correct": true 또는 false, "feedback": "한국어 한두 문장. 맞으면 구체적으로 칭찬, 틀리면 무엇이 왜 틀렸는지 콕 집어주고 올바른 예시 문장을 알려줘. 꼭 기억해야 할 핵심 부분(정답 be동사, 올바른 영어 예시 문장 등)은 **별표 두 개**로 감싸서 강조해. 예: 정답은 **They are tired.** 예요.", "errors": ["학생 입력에서 틀린 부분만 원문 그대로(대소문자·철자 유지) 복사한 짧은 조각들의 배열. 정답이거나 틀린 곳이 없으면 빈 배열."]}';
  const input='한국어 문장: "'+it.ko+'"\n참고용 모범답안: '+((it.ans||[]).join(' / '))+'\n학생이 쓴 영어: "'+myAns+'"';
  const raw=await callGemini(system,input);
  const m=raw.match(/\{[\s\S]*\}/); const obj=JSON.parse(m?m[0]:raw);
  return {correct:!!obj.correct, feedback:String(obj.feedback||'').trim(), errors:Array.isArray(obj.errors)?obj.errors:[]};
}
async function aiGradeExplain(question,modelAnswer,myAns){
  const system='너는 be동사를 배우고 싶어하는 호기심 많은 친구 "베플리"야. 사용자(선생님 역할)가 아래 질문에 대해 한국어로 설명해주고 있어. 반드시 아래 JSON 형식으로만, 다른 말 없이 답해.\n{"reply":"3문장 이내 친근한 존댓말 반응. 설명이 충분하면 핵심을 짧게 정리해 확인해주고, 부족하면 정답을 바로 말하지 말고 스스로 떠올리게 하는 쉬운 질문 하나로 이끌어줘. 반말 금지, 마크다운 금지, 이모지 최대 1개.","understood":true 또는 false}';
  const input='질문: "'+question+'"\n참고용 모범 설명: "'+modelAnswer+'"\n선생님의 설명: "'+myAns+'"';
  const raw=await callGemini(system,input);
  const m=raw.match(/\{[\s\S]*\}/); const obj=JSON.parse(m?m[0]:raw);
  return {reply:String(obj.reply||'').trim(), understood:!!obj.understood};
}

function runQuiz(items,mode,onDone,opt={}){
  let idx=0; const wrong=[]; const results=[]; show();
  function autoDelay(it,ok){
    if(it.type==='guide'||it.type==='complete') return 0;
    if(it.type==='write' && !ok) return 0;
    if(it.type==='write') return 2100;
    if(it.type==='fix') return ok ? 1300 : 2300;
    if(it.type==='order') return ok ? 1100 : 2100;
    if(it.type==='mc' || it.type==='ox') return ok ? 900 : 1700;
    return 1200;
  }
  function nextOrFinish(){ idx++; if(idx<items.length)show(); else finish(); }
  function footerFor(it){
    if(it.type==='mc' || it.type==='ox'){
      footer(`<div class="auto-note">선택하면 바로 채점되고 다음 문제로 넘어가요.</div><button class="btn primary hidden-auto" id="actBtn" data-phase="check" disabled>자동 채점</button>`);
    }else if(it.type==='order'){
      footer(`<button class="btn primary" id="actBtn" data-phase="check" disabled>완성했어요</button>`);
    }else if(it.type==='fix'){
      footer(`<button class="btn primary" id="actBtn" data-phase="check" disabled>채점하기</button>`);
    }else if(it.type==='write'){
      footer(`<button class="btn primary" id="actBtn" data-phase="check" disabled>AI 첨삭 받기</button>`);
    }else{
      footer(`<button class="btn primary" id="actBtn" data-phase="check" disabled>확인</button>`);
    }
  }
  function bindImmediate(it,api){
    let targets=null;
    if(it.type==='mc') targets=api.host.querySelectorAll('.opt');
    else if(it.type==='ox') targets=api.host.querySelectorAll('.ox button');
    else if(it.type==='fix' && it.fixMode==='choice') targets=api.host.querySelectorAll('.fixopt'); // 올바른 단어 선택 시 자동 채점·진행
    if(!targets) return;
    targets.forEach(el=>el.addEventListener('click',()=>{
      setTimeout(()=>{
        const btn=$('actBtn');
        if(btn && btn.dataset.phase==='check' && api.answered()) act(it,api);
      },40);
    }));
  }
  function show(){ const it=items[idx]; const api=renderItemBody(it);
    api.badge((opt.label||'Q')+' '+(idx+1)+' / '+items.length);
    const w=document.createElement('div'); w.className='wrap';
    w.innerHTML=`<div class="head"><span class="kicker">${opt.kicker||''}</span><span class="qcount">${idx+1} / ${items.length}</span></div>`;
    w.appendChild(api.host); stageEl.innerHTML=''; stageEl.appendChild(w); stageEl.scrollTop=0;
    footerFor(it);
    if($('actBtn')) $('actBtn').onclick=()=>act(it,api);
    bindImmediate(it,api);
  }
  async function handleWrite(it,api,btn){
    const myAns=api.get(); const fb=api.fb();
    btn.disabled=true; btn.textContent='AI가 첨삭 중… ⏳';
    if(fb){ fb.className='fb show'; fb.innerHTML='<div class="fb-top"><span>🤖</span><b>AI 첨삭</b></div><div class="fb-why">AI 선생님이 문장을 살펴보고 있어요…</div>'; }
    let ok,html;
    try{ const r=await aiGradeWrite(it,myAns); ok=r.correct;
      html='<div class="fb-top"><span>🤖</span><b>AI 첨삭</b></div><div class="fb-why">'+(ok?'':'입력: <i style="opacity:.9">'+markErrors(myAns,r.errors)+'</i><br>')+fmtFb(r.feedback)+'</div>';
    }catch(e){ ok=api.check(); html=fbView(it,ok,myAns); }
    api.lock(ok); record(it.skill,ok); grade(ok,15); sfx(ok); showMark(ok); results[idx]=ok; if(!ok)wrong.push(idx); recordHistory(opt,it,api,ok);
    if(fb){ fb.className='fb show '+(ok?'ok':'no'); fb.innerHTML=html; }
    btn.dataset.phase='next'; btn.disabled=false;
    btn.textContent=idx<items.length-1?'피드백 읽고 다음 ▶':'완료 ▶';
  }
  function act(it,api){ const btn=$('actBtn');
    if(!btn) return;
    if(btn.dataset.phase==='check'){
      if(!api.answered())return;
      if(it.type==='write'){ handleWrite(it,api,btn); return; }
      const ok=api.check(); api.lock(ok); record(it.skill,ok); grade(ok,it.type==='write'?15:10);
      sfx(ok); showMark(ok); results[idx]=ok; if(!ok)wrong.push(idx); recordHistory(opt,it,api,ok);
      const fb=api.fb();
      if(mode==='teach' || mode==='drill'){
        if(fb){
          fb.className='fb show '+(ok?'ok':'no');
          if(it.type==='write') fb.innerHTML=fbView(it,ok,api.get());
          else if(mode==='teach' || it.type==='order' || it.type==='fix') fb.innerHTML=fbView(it,ok,api.get());
        }
      }
      btn.dataset.phase='next'; btn.disabled=false; btn.textContent=idx<items.length-1?'다음 ▶':'완료 ▶';
      const d=autoDelay(it,ok);
      if(d>0){
        btn.disabled=true;
        btn.textContent=idx<items.length-1?'다음 문제로 이동 중…':'결과로 이동 중…';
        setTimeout(()=>{ if(btn.dataset.phase==='next') nextOrFinish(); }, d);
      }else if(it.type==='write' && !ok){
        btn.disabled=false;
        btn.textContent=idx<items.length-1?'피드백 읽고 다음 ▶':'완료 ▶';
      }
    } else { nextOrFinish(); }
  }
  function finish(){ if(opt.onFinish){ opt.onFinish({correct:results.filter(Boolean).length,total:items.length,results:results.slice(),wrong:wrong.map(i=>items[i])}); return; } if(mode!=='drill'){onDone&&onDone();return;}
    const correct=results.filter(Boolean).length,n=items.length,all=wrong.length===0;
    const w=document.createElement('div'); w.className='wrap';
    const c=document.createElement('div'); c.className='card';
    c.innerHTML=`<div class="praise">${all?'완벽해요! 🎉':'잘하고 있어!'}</div><div class="scorebig">${correct} / ${n}</div>
      <div class="scoresub">${all?'문법 실력 풀충전을 향해 가즈아!':'틀린 문제는 확실히 짚고 가요'}</div>
      <div class="qgrid">${results.map((r,i)=>`<div class="qg ${r?'o':'x'}">${i+1}</div>`).join('')}</div>`;
    w.appendChild(c); stageEl.innerHTML=''; stageEl.appendChild(w); stageEl.scrollTop=0;
    window.__qd=onDone;
    if(all) footer(`<button class="btn primary" onclick="window.__qd&&window.__qd()">계속하기 ▶</button>`);
    else footer(`<button class="btn ghost" id="skip">그냥 넘어가기</button><button class="btn primary" id="rt">틀린 문제 다시 풀기</button>`);
    if(!all){ $('skip').onclick=()=>onDone&&onDone();
      $('rt').onclick=()=>runQuiz(wrong.map(i=>items[i]),'teach',onDone,{label:'오답',kicker:'🔁 오답 재도전 · AI 추천 태그'}); }
  }
}

/* ===== 적응형 출제 (진단→약점 가중 · 80% 통과 · 천장 10) ===== */
function skillAcc(sk){ const v=S.skillStat[sk]; return v&&v.n? v.correct/v.n : 0.5; }
function diagStrong(){ return ['1인칭','3인칭단수','복수주어'].every(s=>{const v=S.skillStat[s]; return v&&v.n>0&&v.correct===v.n;}); }
function pickWeak(pool,used,n,missed){
  const cand=pool.map((it,i)=>({it,i})).filter(x=>!used.has(x.i));
  cand.sort((a,b)=>{ const ma=missed&&missed[a.it.skill]?1:0, mb=missed&&missed[b.it.skill]?1:0; if(mb!==ma)return mb-ma; return skillAcc(a.it.skill)-skillAcc(b.it.skill); });
  const sel=cand.slice(0,Math.max(0,n)); sel.forEach(x=>used.add(x.i)); return sel.map(x=>x.it);
}
/* Level Up 난이도 배치: 선택(fix-choice) → 고쳐쓰기(fix-input) → 어순배열(order), 배치당 2/2/1. 변별(mc)은 제외 */
function lvMode(it){ return it.type==='fix' ? (it.fixMode==='choice'?'choice':'input') : (it.type==='order'?'order':'other'); }
function lvRemain(pool,used){ let c=0; pool.forEach((it,i)=>{ if(!used.has(i)&&lvMode(it)!=='other')c++; }); return c; }
function pickLv2(pool,used,n){ n=n||5; const sh=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1]);
  const byMode=m=>sh(pool.map((it,i)=>({it,i})).filter(x=>!used.has(x.i)&&lvMode(x.it)===m));
  const out=[]; const take=(m,cnt)=>{ const a=byMode(m); for(let k=0;k<cnt&&a.length;k++){const x=a.shift();used.add(x.i);out.push(x.it);} };
  take('choice',2); take('input',2); take('order',1);
  if(out.length<n){ ['choice','input','order'].forEach(m=>{ const a=byMode(m); while(out.length<n&&a.length){const x=a.shift();used.add(x.i);out.push(x.it);} }); }
  return out;
}
function runAdaptive(poolKey,mode,onDone,opt){
  opt=opt||{}; const pool=Q[poolKey]||[]; const used=new Set();
  let stageCorrect=0, stageTotal=0; const missed={}; const allResults=[]; const CAP=10;
  const coreSize=(poolKey==='checkup'&&diagStrong())?3:5;
  const ordered=(poolKey==='lv2');  // Level Up: 난이도 순서(선택→고쳐쓰기→어순배열) 고정 배치
  function round(batch,rmode,kicker){
    if(!batch||!batch.length){ passScreen(); return; }
    runQuiz(batch,rmode,null,Object.assign({},opt,{kicker:kicker||opt.kicker,onFinish:function(sum){
      stageCorrect+=sum.correct; stageTotal+=sum.total; sum.results.forEach(r=>allResults.push(!!r));
      sum.wrong.forEach(it=>{ missed[it.skill]=(missed[it.skill]||0)+1; });
      const acc=stageTotal?stageCorrect/stageTotal:1;
      if(stageTotal>=CAP||acc>=0.8){ passScreen(); }
      else if(ordered){ round(pickLv2(pool,used,5),mode,'➕ 난이도 순 · 더 풀기'); }
      else { const reAsk=sum.wrong.slice(0,3); const fresh=pickWeak(pool,used,5-reAsk.length,missed); round(reAsk.concat(fresh),'teach','🔁 약점 보강 · 한 번 더!'); }
    }}));
  }
  function passScreen(){
    const acc=Math.round((stageTotal?stageCorrect/stageTotal:1)*100); const remain=ordered?lvRemain(pool,used):(pool.length-used.size);
    const w=document.createElement('div'); w.className='wrap';
    w.innerHTML='<div class="card"><div class="praise">오늘 목표 달성! 🎉</div><div class="scorebig">'+stageCorrect+' / '+stageTotal+'</div><div class="scoresub">정답률 '+acc+'% · '+(coreSize===3?'기초가 탄탄해 빠르게 통과했어요!':'잘 해냈어요!')+'</div><div class="qgrid">'+allResults.map(function(r,i){return '<div class="qg '+(r?'o':'x')+'">'+(i+1)+'</div>';}).join('')+'</div></div>';
    stageEl.innerHTML=''; stageEl.appendChild(w); stageEl.scrollTop=0;
    stopSpeak(); speakChunks([{t:'수고했어요!'}]);
    window.__advNext=function(){ if(onDone)onDone(); };
    window.__advMore=function(){ const more=ordered?pickLv2(pool,used,Math.min(5,remain)):pickWeak(pool,used,Math.min(5,remain),missed); if(more.length) round(more,mode,'➕ 마스터 챌린지 · 더 풀기'); };
    if(remain>0) footer('<button class="btn ghost" onclick="window.__advMore()">➕ 더 풀기 (마스터 챌린지)</button><button class="btn primary" onclick="window.__advNext()">계속하기 ▶</button>');
    else footer('<button class="btn primary" onclick="window.__advNext()">계속하기 ▶</button>');
  }
  round(ordered?pickLv2(pool,used,coreSize):pickWeak(pool,used,coreSize,null),mode,opt.kicker);
}

  let commentText=null, commentSpoken=false;

  try{

      .then(full=>{ const t=(full||'').trim(); commentText=t||ruleFb; if(!t&&coach)coach.innerHTML=esc(ruleFb); maybeSpeakComment(); })
      .catch(()=>{ if(coach)coach.innerHTML=esc(ruleFb); commentText=ruleFb; maybeSpeakComment(); });

RENDER.concept=()=>{ try{loadVoices();if('speechSynthesis'in window)speechSynthesis.onvoiceschanged=loadVoices;}catch(e){}

    try{ const rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
      const out=document.getElementById('voiceOut'); if(out){out.className='fb show ok';out.innerHTML=waitingText;}
      rec.onresult=e=>{ const txt=e.results&&e.results[0]&&e.results[0][0]?e.results[0][0].transcript:''; onResult(txt); };

  const wrongs=S.history.filter(h=>!h.correct);
  if(!wrongs.length) return '<div class="card" style="margin-top:14px"><div style="font-weight:850">📝 오답 노트</div><div style="color:var(--muted);font-size:.9rem;margin-top:8px">오답이 없어요! 완벽해요 🎉</div></div>';
  const show=wrongs.slice(0,12).map(h=>'<div style="padding:10px 0;border-bottom:1px solid var(--line)"><div style="font-size:.9rem;font-weight:700">'+esc(h.question)+'</div><div style="font-size:.84rem;color:var(--muted);margin-top:3px">내 답: <span style="color:var(--warn)">'+(esc(h.myAnswer)||'-')+'</span> · 정답: <span style="color:var(--accent)">'+esc(h.solution)+'</span></div></div>').join('');
  return '<div class="card" style="margin-top:14px"><div style="font-weight:850;margin-bottom:6px">📝 오답 노트 <span style="font-size:.78rem;color:var(--muted);font-weight:700">· 14일 안에 다시 풀어 점수를 올려요</span></div>'+show+(wrongs.length>12?'<div style="font-size:.82rem;color:var(--muted);margin-top:8px">외 '+(wrongs.length-12)+'개</div>':'')+'<button class="btn ghost" style="margin-top:12px" onclick="window.__redo14()">오답만 다시 풀기 (14일)</button></div>';
}
window.__redo14=function(){ toast('오답 14일 재도전은 다음 버전에서 제공돼요 😊'); };
function labelSkill(k){return ({'1인칭':'1인칭 I + am','1인칭복수':'1인칭 복수 We + are','2인칭':'2인칭 You + are','3인칭단수':'3인칭 단수 + is','복수주어':'복수 주어 + are','줄임말':'줄임말 (I’m, She’s)','함정':'헷갈리는 함정','변별':'고난도 변별','공통':'공통 빈칸','의문문':'의문문','대답':'의문문 대답','어법오류':'어법 오류 찾기','어법정답':'어법 옳은 것','뜻':'be동사 뜻','설명하기':'설명왕 (가르치기)'})[k]||k;}

/* boot */
window.DATA=Q;window.STATE=S;window.RENDER=RENDER;window.STAGES=STAGES;
renderSteps(); RENDER.intro();
if(REVIEW_MODE){
  const rb=document.createElement('button');
  rb.textContent='⏭ 다음 단계(검수)';
  rb.style.cssText='position:fixed;right:10px;bottom:10px;z-index:99999;background:#191f28;color:#fff;border:none;border-radius:9999px;padding:8px 14px;font-size:12px;font-weight:700;opacity:.85;cursor:pointer';
  rb.onclick=()=>{
    try{stopSpeak();}catch(e){}
    if(S.stageIdx+1<STAGES.length) next(); else toast('마지막 단계예요');
  };
  document.body.appendChild(rb);
}
</script>
</body>
